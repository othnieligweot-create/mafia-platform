<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mafia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://8x8.vc/vpaas-magic-cookie-07a593c9625c45d5b393a330482f2d32/external_api.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #08090C;
            --surface:   #13141A;
            --elevated:  #1E2028;
            --border:    rgba(255,255,255,0.07);
            --text:      #E8E9F0;
            --muted:     #6B7080;
            --accent:    #C9F0FF;
            --accent-dim: rgba(201,240,255,0.12);
            --accent-glow: rgba(201,240,255,0.25);
            --red:       #FF4458;
            --red-dim:   rgba(255,68,88,0.12);
            --gold:      #F5C842;
            --gold-dim:  rgba(245,200,66,0.12);
            --green:     #3EFFA8;
            --green-dim: rgba(62,255,168,0.12);
            --radius:    14px;
            --radius-sm: 8px;
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* ─── SCREENS ─── */
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
        }

        /* ─── JOIN SCREEN ─── */
        #join-screen {
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            background: var(--bg);
        }

        .join-inner {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .join-title {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1;
            margin-bottom: 6px;
            color: var(--text);
        }

        .join-title span {
            color: var(--accent);
        }

        .join-sub {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 14px;
        }

        .field label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .field input {
            background: var(--elevated);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            padding: 14px 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .field input::placeholder { color: var(--muted); }

        .btn {
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 15px 20px;
            transition: all 0.18s ease;
            width: 100%;
            letter-spacing: 0.2px;
        }

        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--accent);
            color: #08090C;
            margin-top: 8px;
            box-shadow: 0 0 24px var(--accent-glow);
        }

        .btn-primary:hover { filter: brightness(1.08); }

        .btn-danger {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(255,68,88,0.2);
        }

        .btn-gold {
            background: var(--gold-dim);
            color: var(--gold);
            border: 1px solid rgba(245,200,66,0.2);
        }

        .btn-ghost {
            background: var(--elevated);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-green {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(62,255,168,0.2);
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 0.82rem;
            width: auto;
            border-radius: 6px;
        }

        /* ─── GAME SCREEN ─── */
        #game-screen {
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        /* Top bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .top-bar-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .room-label {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .room-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .round-badge {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            background: var(--accent-dim);
            border: 1px solid rgba(201,240,255,0.2);
            border-radius: 20px;
            padding: 4px 12px;
            font-weight: 500;
        }

        .stats-pill {
            display: flex;
            gap: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--muted);
            background: var(--elevated);
            border-radius: 20px;
            padding: 5px 10px;
        }

        .stats-pill .w { color: var(--green); }
        .stats-pill .l { color: var(--red); }

        /* Announcement bar */
        .announcement-bar {
            padding: 10px 20px;
            font-size: 0.85rem;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            min-height: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            transition: color 0.3s;
        }

        .announcement-bar.highlight {
            color: var(--text);
        }

        /* Role chip — always visible during game */
        .role-chip {
            margin: 12px 20px 0;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .role-chip.mafia {
            background: var(--red-dim);
            border: 1px solid rgba(255,68,88,0.2);
        }

        .role-chip.civilian {
            background: var(--green-dim);
            border: 1px solid rgba(62,255,168,0.2);
        }

        .role-chip.spectator {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
        }

        .role-chip.spectator .role-chip-name { color: var(--muted); }

        .role-chip-icon { font-size: 1.3rem; }

        .role-chip-text { flex: 1; }
        .role-chip-name {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .role-chip.mafia .role-chip-name { color: var(--red); }
        .role-chip.civilian .role-chip-name { color: var(--green); }

        .role-chip-hint {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 1px;
        }

        /* Player list */
        .players-section {
            flex: 1;
            overflow-y: auto;
            padding: 14px 20px;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .player-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: default;
            transition: all 0.18s ease;
            position: relative;
            overflow: hidden;
        }

        .player-card.votable {
            cursor: pointer;
        }

        .player-card.votable:active {
            transform: scale(0.98);
        }

        .player-card.my-target {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .player-card.mafia-target {
            border-color: var(--red);
            background: var(--red-dim);
        }

        .player-card.dead {
            opacity: 0.3;
            border-color: transparent;
            cursor: not-allowed;
        }

        .player-card.reconnecting {
            opacity: 0.5;
            border-style: dashed;
        }

        .player-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
            color: var(--muted);
            flex-shrink: 0;
            letter-spacing: -0.5px;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag-you { background: var(--accent-dim); color: var(--accent); }
        .tag-host { background: var(--gold-dim); color: var(--gold); }
        .tag-dead { background: rgba(255,255,255,0.06); color: var(--muted); }
        .tag-reconnecting { background: var(--red-dim); color: var(--red); }

        .player-status {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .player-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .vote-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.4s ease;
            border-radius: 0 2px 0 0;
        }

        .vote-bar.mafia-bar { background: var(--red); }

        .vote-count {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--accent);
            background: var(--accent-dim);
            border-radius: 20px;
            padding: 3px 9px;
            flex-shrink: 0;
        }

        .vote-count.mafia-count {
            color: var(--red);
            background: var(--red-dim);
        }

        /* Bottom action zone */
        .action-zone {
            padding: 14px 20px 28px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
            background: var(--bg);
        }

        .action-row {
            display: flex;
            gap: 8px;
        }

        .action-row .btn { flex: 1; }

        /* Video container */
        #video-container {
            position: fixed;
            bottom: 100px;
            right: 16px;
            width: 130px;
            height: 180px;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1.5px solid var(--accent);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
            z-index: 100;
            background: var(--surface);
            display: none;
        }

        #video-container.active { display: block; }

        #video-container:fullscreen,
        #video-container:-webkit-full-screen {
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
        }

        /* ─── ROLE REVEAL OVERLAY ─── */
        #role-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8,9,12,0.97);
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 40px 32px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #role-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .role-reveal-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            font-weight: 600;
        }

        .role-reveal-icon {
            font-size: 4rem;
            line-height: 1;
        }

        .role-reveal-name {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .role-reveal-name.mafia { color: var(--red); }
        .role-reveal-name.civilian { color: var(--green); }

        .role-reveal-hint {
            font-size: 0.95rem;
            color: var(--muted);
            text-align: center;
            line-height: 1.5;
            max-width: 260px;
        }

        .role-reveal-dismiss {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 8px;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* ─── LOBBY (pre-game) ─── */
        #lobby-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 0;
        }

        .lobby-hero {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }

        .lobby-hero-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .lobby-hero-sub {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .player-count-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--elevated);
            border: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 16px auto;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .player-count-num {
            font-family: 'DM Mono', monospace;
            font-size: 1.6rem;
            font-weight: 500;
            color: var(--accent);
            line-height: 1;
        }

        .player-count-label {
            font-size: 0.6rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ─── GAME OVER ─── */
        .game-over-banner {
            margin: 0 20px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            display: none;
        }

        .game-over-banner.visible { display: block; }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--elevated); border-radius: 4px; }

        /* ─── PULSE RING (round indicator) ─── */
        .pulse-ring {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 0 var(--accent-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 var(--accent-glow); }
            70% { box-shadow: 0 0 0 10px rgba(201,240,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(201,240,255,0); }
        }

        /* ─── RECORD STATUS ─── */
        .record-status {
            font-size: 0.78rem;
            color: var(--muted);
            text-align: center;
            padding: 0 4px;
            display: none;
        }

        .record-status.visible { display: block; }
    </style>
</head>
<body>

<!-- ═══ JOIN SCREEN ═══ -->
<div id="join-screen" class="screen">
    <div class="join-inner">
        <div class="join-title">Mafia<span>.</span></div>
        <div class="join-sub">Social deduction. Real stakes.</div>

        <div class="field">
            <label for="username">Your handle</label>
            <input type="text" id="username" placeholder="e.g. Ghost" maxlength="20" autocomplete="off">
        </div>
        <div class="field">
            <label for="room-id">Room code</label>
            <input type="text" id="room-id" placeholder="e.g. Alpha7" maxlength="20" autocomplete="off">
        </div>
        <button class="btn btn-primary" id="join-btn">Join Room</button>
    </div>
</div>

<!-- ═══ GAME SCREEN ═══ -->
<div id="game-screen" class="screen hidden">

    <!-- Top bar -->
    <div class="top-bar">
        <div class="top-bar-left">
            <div class="room-label">Room</div>
            <div class="room-name" id="display-room">—</div>
        </div>
        <div class="top-bar-right">
            <div class="round-badge" id="round-badge" style="display:none">
                <span class="pulse-ring"></span>&nbsp; Round <span id="round-num">1</span>
            </div>
            <div class="stats-pill">
                <span class="w">W <span id="stat-wins">0</span></span>
                <span class="l">L <span id="stat-losses">0</span></span>
            </div>
        </div>
    </div>

    <!-- Announcement bar -->
    <div class="announcement-bar" id="announcement-bar">
        Waiting for players...
    </div>

    <!-- Game over banner -->
    <div class="game-over-banner" id="game-over-banner"></div>

    <!-- Role chip (shown during active game) -->
    <div class="role-chip hidden" id="role-chip">
        <div class="role-chip-icon" id="role-chip-icon"></div>
        <div class="role-chip-text">
            <div class="role-chip-name" id="role-chip-name"></div>
            <div class="role-chip-hint" id="role-chip-hint"></div>
        </div>
    </div>

    <!-- Lobby section (pre-game) -->
    <div id="lobby-section">
        <div class="lobby-hero">
            <div class="lobby-hero-title">Waiting for host</div>
            <div class="lobby-hero-sub">Share your room code with friends</div>
            <div class="player-count-ring">
                <div class="player-count-num" id="player-count">1</div>
                <div class="player-count-label">players</div>
            </div>
        </div>
        <div class="section-label">In this room</div>
        <ul class="player-list" id="lobby-player-list"></ul>
    </div>

    <!-- Players section (during game) -->
    <div class="players-section hidden" id="players-section">
        <div class="section-label" id="vote-section-label">Tap a player to vote</div>
        <ul class="player-list" id="player-list"></ul>
    </div>

    <!-- Action zone -->
    <div class="action-zone">
        <div id="record-status" class="record-status"></div>

        <!-- Video + record row -->
        <div class="action-row" id="video-row">
            <button class="btn btn-ghost" id="video-btn">🎥 Join Video</button>
            <button class="btn btn-ghost hidden" id="record-btn">⏺ Record</button>
        </div>

        <!-- Host controls -->
        <div id="host-controls" class="hidden">
            <button class="btn btn-primary" id="start-btn">Launch Game</button>
            <div class="action-row" id="host-game-controls" style="display:none">
                <button class="btn btn-danger" id="end-round-btn">End Round</button>
                <button class="btn btn-ghost" id="restart-btn">↺ Restart</button>
            </div>
        </div>

        <!-- Player waiting message -->
        <div id="wait-message" class="hidden" style="text-align:center; font-size:0.85rem; color:var(--muted); padding:4px 0;">
            Waiting for the host to start...
        </div>
    </div>
</div>

<!-- ═══ ROLE REVEAL OVERLAY ═══ -->
<div id="role-overlay">
    <div class="role-reveal-label">Your role</div>
    <div class="role-reveal-icon" id="reveal-icon"></div>
    <div class="role-reveal-name" id="reveal-name"></div>
    <div class="role-reveal-hint" id="reveal-hint"></div>
    <div class="role-reveal-dismiss">Tap anywhere to continue</div>
</div>

<!-- Video container (PiP) -->
<div id="video-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let jitsiApi = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let recordingStream = null;

    // State
    let myId = null;
    let myUsername = '';
    let currentRoom = '';
    let amIHost = false;
    let amIAlive = true;
    let myRole = null;
    let gameStarted = false;
    let currentRound = 0;
    let lastUsers = [];
    let lastVotes = {};
    let lastMafiaVotes = {};
    let currentHostId = null;
    let totalAlive = 0;
    let _myVoteTarget = null;
    let _myMafiaVoteTarget = null;

    // Elements
    const joinScreen = document.getElementById('join-screen');
    const gameScreen = document.getElementById('game-screen');
    const usernameInput = document.getElementById('username');
    const roomIdInput = document.getElementById('room-id');
    const joinBtn = document.getElementById('join-btn');
    const displayRoom = document.getElementById('display-room');
    const roundBadge = document.getElementById('round-badge');
    const roundNum = document.getElementById('round-num');
    const statWins = document.getElementById('stat-wins');
    const statLosses = document.getElementById('stat-losses');
    const announcementBar = document.getElementById('announcement-bar');
    const gameOverBanner = document.getElementById('game-over-banner');
    const roleChip = document.getElementById('role-chip');
    const roleChipIcon = document.getElementById('role-chip-icon');
    const roleChipName = document.getElementById('role-chip-name');
    const roleChipHint = document.getElementById('role-chip-hint');
    const lobbySection = document.getElementById('lobby-section');
    const playersSection = document.getElementById('players-section');
    const playerCount = document.getElementById('player-count');
    const lobbyPlayerList = document.getElementById('lobby-player-list');
    const playerList = document.getElementById('player-list');
    const voteSectionLabel = document.getElementById('vote-section-label');
    const recordStatus = document.getElementById('record-status');
    const videoBtn = document.getElementById('video-btn');
    const recordBtn = document.getElementById('record-btn');
    const hostControls = document.getElementById('host-controls');
    const startBtn = document.getElementById('start-btn');
    const hostGameControls = document.getElementById('host-game-controls');
    const endRoundBtn = document.getElementById('end-round-btn');
    const restartBtn = document.getElementById('restart-btn');
    const waitMessage = document.getElementById('wait-message');
    const roleOverlay = document.getElementById('role-overlay');
    const revealIcon = document.getElementById('reveal-icon');
    const revealName = document.getElementById('reveal-name');
    const revealHint = document.getElementById('reveal-hint');
    const videoContainer = document.getElementById('video-container');

    // ── JOIN ──
    joinBtn.addEventListener('click', attemptJoin);
    usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') roomIdInput.focus(); });
    roomIdInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptJoin(); });

    function attemptJoin() {
        const username = usernameInput.value.trim();
        const room = roomIdInput.value.trim();
        if (!username || !room) { alert('Enter both a handle and a room code.'); return; }
        myUsername = username;
        currentRoom = room;
        socket.emit('joinRoom', { username, room });
        showGameScreen();
    }

    function showGameScreen() {
        joinScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        displayRoom.innerText = currentRoom;
    }

    // ── SOCKET EVENTS ──
    socket.on('connect', () => {
        const wasReconnect = myId !== null;
        myId = socket.id;
        if (wasReconnect && currentRoom && myUsername) {
            socket.emit('joinRoom', { username: myUsername, room: currentRoom });
        }
    });

    socket.on('disconnect', () => {
        if (currentRoom) announce('Connection lost — reconnecting...', false);
    });

    socket.on('joinRejected', ({ reason }) => {
        if (reason === 'username-taken') {
            // Only happens if a genuinely different active session has this name.
            // Show an error and go back to join screen.
            gameScreen.classList.add('hidden');
            joinScreen.classList.remove('hidden');
            currentRoom = '';
            usernameInput.value = myUsername;
            roomIdInput.value = '';
            alert(`"${myUsername}" is already taken in that room by another player. Try a different handle.`);
        }
    });

    socket.on('isHost', () => {
        amIHost = true;
        updateControls();
    });

    socket.on('isPlayer', () => {
        amIHost = false;
        updateControls();
    });

    socket.on('profileUpdate', ({ wins, losses }) => {
        statWins.innerText = wins;
        statLosses.innerText = losses;
    });

    socket.on('roomUsers', ({ users, hostId }) => {
        lastUsers = users;
        currentHostId = hostId;
        const me = users.find(u => u.id === myId);
        if (me) amIAlive = me.alive;
        totalAlive = users.filter(u => u.alive && !u.disconnected).length;
        renderPlayers();
        updateControls();
    });

    socket.on('assignRole', role => {
        myRole = role;
        showRoleReveal(role);
        updateRoleChip();
    });

    socket.on('gameStarted', ({ round }) => {
        gameStarted = true;
        currentRound = round;
        lobbySection.classList.add('hidden');
        playersSection.classList.remove('hidden');
        roleChip.classList.remove('hidden');
        roundBadge.style.display = 'flex';
        roundNum.innerText = round;
        hostGameControls.style.display = 'flex';
        startBtn.style.display = 'none';
        updateControls();
        announce('Game started — round 1 begins.');
    });

    socket.on('roundStarted', ({ round }) => {
        currentRound = round;
        roundNum.innerText = round;
        lastVotes = {};
        lastMafiaVotes = {};
        _myVoteTarget = null;
        _myMafiaVoteTarget = null;
        renderPlayers();
        announce(`Round ${round} — discuss and vote.`);
    });

    socket.on('voteUpdate', votes => {
        lastVotes = votes;
        renderPlayers();
    });

    socket.on('mafiaVoteUpdate', votes => {
        lastMafiaVotes = votes;
        renderPlayers();
    });

    socket.on('announcement', msg => announce(msg, true));

    socket.on('eliminated', () => {
        amIAlive = false;
        updateRoleChip();
        announce('You were eliminated — you are now spectating. Watch the game unfold.', true);
    });

    socket.on('rejoined', ({ role, alive }) => {
        myRole = role;
        amIAlive = alive;
        announce('You reconnected successfully.', false);
        updateRoleChip();
        if (gameStarted) {
            lobbySection.classList.add('hidden');
            playersSection.classList.remove('hidden');
            roleChip.classList.remove('hidden');
        }
    });

    socket.on('kicked', () => {
        alert('You were removed from the room by the host.');
        currentRoom = '';
        gameScreen.classList.add('hidden');
        joinScreen.classList.remove('hidden');
        if (jitsiApi) { jitsiApi.dispose(); jitsiApi = null; }
    });

    socket.on('gameOver', msg => {
        gameStarted = false;
        gameOverBanner.innerText = msg;
        gameOverBanner.classList.add('visible');
        announce(msg, true);
        hostGameControls.style.display = 'none';
        if (amIHost) startBtn.style.display = 'block';
        updateControls();
    });

    socket.on('gameReset', () => {
        gameStarted = false;
        myRole = null;
        amIAlive = true;
        currentRound = 0;
        lastVotes = {};
        lastMafiaVotes = {};
        gameOverBanner.classList.remove('visible');
        roleChip.classList.add('hidden');
        playersSection.classList.add('hidden');
        lobbySection.classList.remove('hidden');
        roundBadge.style.display = 'none';
        hostGameControls.style.display = 'none';
        startBtn.style.display = 'block';
        announce('Game reset — back to lobby.', false);
        updateControls();
    });

    // ── RENDERING ──
    function announce(msg, highlight = false) {
        announcementBar.innerText = msg;
        announcementBar.classList.toggle('highlight', highlight);
    }

    function updateRoleChip() {
        if (!myRole || !gameStarted) { roleChip.classList.add('hidden'); return; }
        roleChip.classList.remove('hidden');

        if (!amIAlive) {
            // Spectator mode — neutral styling, role still shown for context
            roleChip.className = 'role-chip spectator';
            roleChipIcon.innerText = '👁';
            roleChipName.innerText = 'SPECTATING';
            roleChipHint.innerText = `You were eliminated (${myRole}). Watch the rest of the game.`;
            return;
        }

        roleChip.className = `role-chip ${myRole}`;
        if (myRole === 'mafia') {
            roleChipIcon.innerText = '🔪';
            roleChipName.innerText = 'MAFIA';
            roleChipHint.innerText = 'Vote secretly to eliminate a civilian each round.';
        } else {
            roleChipIcon.innerText = '🛡';
            roleChipName.innerText = 'CIVILIAN';
            roleChipHint.innerText = 'Vote to expose the mafia before they take over.';
        }
    }

    function updateControls() {
        if (amIHost) {
            hostControls.classList.remove('hidden');
            waitMessage.classList.add('hidden');
            if (!gameStarted) {
                const count = lastUsers.filter(u => !u.disconnected).length;
                startBtn.disabled = count < 3;
                startBtn.innerText = count < 3 ? `Need ${3 - count} more player(s)` : 'Launch Game';
                startBtn.style.display = 'block';
                hostGameControls.style.display = 'none';
            }
        } else {
            hostControls.classList.add('hidden');
            waitMessage.classList.toggle('hidden', gameStarted);
        }
    }

    function renderPlayers() {
        // Lobby list
        playerCount.innerText = lastUsers.length;
        lobbyPlayerList.innerHTML = '';
        lastUsers.forEach(u => {
            const li = document.createElement('li');
            li.className = 'player-card';
            li.innerHTML = `
                <div class="player-avatar">${u.username.slice(0,2).toUpperCase()}</div>
                <div class="player-info">
                    <div class="player-name">
                        ${u.username}
                        ${u.id === myId ? '<span class="tag tag-you">You</span>' : ''}
                        ${u.id === currentHostId ? '<span class="tag tag-host">Host</span>' : ''}
                        ${u.disconnected ? '<span class="tag tag-reconnecting">Away</span>' : ''}
                    </div>
                </div>
            `;
            lobbyPlayerList.appendChild(li);
        });

        // Game player list
        if (!gameStarted) return;
        playerList.innerHTML = '';
        const maxVotes = Math.max(1, ...Object.values(lastVotes));
        const maxMafiaVotes = Math.max(1, ...Object.values(lastMafiaVotes));

        lastUsers.forEach(u => {
            const li = document.createElement('li');
            const isDead = !u.alive;
            const isMe = u.id === myId;
            const iMyTarget = _myVoteTarget === u.id;
            const isMafiaTarget = myRole === 'mafia' && _myMafiaVoteTarget === u.id;

            li.className = [
                'player-card',
                isDead ? 'dead' : '',
                u.disconnected ? 'reconnecting' : '',
                iMyTarget ? 'my-target' : '',
                isMafiaTarget && !iMyTarget ? 'mafia-target' : '',
                (!isDead && !isMe && amIAlive && !u.disconnected && gameStarted) ? 'votable' : ''
            ].join(' ').trim();

            const publicVotes = lastVotes[u.id] || 0;
            const mafiaVotes = lastMafiaVotes[u.id] || 0;

            li.innerHTML = `
                <div class="player-avatar">${u.username.slice(0,2).toUpperCase()}</div>
                <div class="player-info">
                    <div class="player-name">
                        ${u.username}
                        ${isMe ? '<span class="tag tag-you">You</span>' : ''}
                        ${u.id === currentHostId ? '<span class="tag tag-host">Host</span>' : ''}
                        ${isDead ? '<span class="tag tag-dead">Out</span>' : ''}
                        ${u.disconnected ? '<span class="tag tag-reconnecting">Away</span>' : ''}
                    </div>
                    ${isDead ? '' : '<div class="player-status">Alive</div>'}
                </div>
                ${!isDead && amIHost && !isMe ? `
                <div class="player-actions">
                    ${!u.disconnected ? `<button class="btn btn-ghost btn-sm" data-action="makehost" data-id="${u.id}">👑</button>` : ''}
                    <button class="btn btn-danger btn-sm" data-action="kick" data-id="${u.id}">🚪</button>
                </div>` : ''}
                ${publicVotes > 0 ? `<div class="vote-count">${publicVotes}</div>` : ''}
                ${myRole === 'mafia' && amIAlive && mafiaVotes > 0 ? `<div class="vote-count mafia-count">${mafiaVotes}</div>` : ''}
                ${publicVotes > 0 ? `<div class="vote-bar" style="width:${(publicVotes/maxVotes)*100}%"></div>` : ''}
                ${myRole === 'mafia' && amIAlive && mafiaVotes > 0 ? `<div class="vote-bar mafia-bar" style="width:${(mafiaVotes/maxMafiaVotes)*70}%; bottom: 2px"></div>` : ''}
            `;

            // Vote on tap
            if (!isDead && !isMe && amIAlive && !u.disconnected) {
                li.addEventListener('click', (e) => {
                    if (e.target.closest('[data-action]')) return;
                    _myVoteTarget = u.id;
                    if (myRole === 'mafia') _myMafiaVoteTarget = u.id;
                    socket.emit('castVote', { room: currentRoom, targetId: u.id });
                    if (myRole === 'mafia') {
                        socket.emit('castMafiaVote', { room: currentRoom, targetId: u.id });
                    }
                    renderPlayers();
                });
            }

            // Host buttons
            li.querySelectorAll('[data-action]').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const action = btn.dataset.action;
                    const targetId = btn.dataset.id;
                    if (action === 'kick' && confirm(`Remove ${u.username}?`)) {
                        socket.emit('kickPlayer', { room: currentRoom, targetId });
                    }
                    if (action === 'makehost' && confirm(`Make ${u.username} host?`)) {
                        socket.emit('transferHost', { room: currentRoom, targetId });
                    }
                });
            });

            playerList.appendChild(li);
        });

        // Update vote section label
        if (!amIAlive) {
            voteSectionLabel.innerText = '👁 Spectating — votes shown below';
        } else if (myRole === 'mafia') {
            voteSectionLabel.innerHTML = 'Tap to vote &mdash; <span style="color:var(--red)">mafia kill shown in red</span>';
        } else {
            voteSectionLabel.innerText = 'Tap a player to vote them out';
        }
    }

    // ── ROLE REVEAL OVERLAY ──
    function showRoleReveal(role) {
        revealIcon.innerText = role === 'mafia' ? '🔪' : '🛡';
        revealName.className = `role-reveal-name ${role}`;
        revealName.innerText = role === 'mafia' ? 'MAFIA' : 'CIVILIAN';
        revealHint.innerText = role === 'mafia'
            ? 'Secretly eliminate civilians each round. Blend in during group discussion.'
            : 'Find and expose the mafia before they outnumber you.';
        roleOverlay.classList.add('visible');
    }

    roleOverlay.addEventListener('click', () => {
        roleOverlay.classList.remove('visible');
    });

    // ── HOST BUTTONS ──
    startBtn.addEventListener('click', () => {
        socket.emit('startGame', currentRoom);
    });

    endRoundBtn.addEventListener('click', () => {
        if (confirm('End this round and resolve all votes?')) {
            socket.emit('endRound', currentRoom);
        }
    });

    restartBtn.addEventListener('click', () => {
        if (confirm('Reset the game for everyone?')) {
            socket.emit('restartGame', currentRoom);
        }
    });

    // ── VIDEO ──
    videoBtn.addEventListener('click', async () => {
        if (jitsiApi) {
            // Expand to fullscreen portrait
            goFullscreen();
            return;
        }
        videoBtn.innerText = '⏳ Connecting...';
        videoBtn.disabled = true;
        await initVideo();
        videoBtn.disabled = false;
    });

    async function initVideo() {
        if (typeof JitsiMeetExternalAPI === 'undefined') {
            announce('Video unavailable — check your connection.', false);
            videoBtn.innerText = '🎥 Join Video';
            return;
        }

        let tokenData;
        try {
            const res = await fetch('/api/video-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: myUsername, room: currentRoom, isModerator: amIHost })
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || `Server error ${res.status}`);
            }
            tokenData = await res.json();
        } catch (err) {
            announce('Video token error: ' + err.message, false);
            videoBtn.innerText = '🎥 Join Video';
            return;
        }

        videoContainer.classList.add('active');
        jitsiApi = new JitsiMeetExternalAPI('8x8.vc', {
            roomName: tokenData.roomName,
            jwt: tokenData.token,
            width: '100%',
            height: '100%',
            parentNode: videoContainer,
            userInfo: { displayName: myUsername },
            configOverwrite: {
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                prejoinPageEnabled: false,
                disableDeepLinking: true,
                tileViewEnabled: true
            },
            interfaceConfigOverwrite: {
                TOOLBAR_BUTTONS: ['microphone', 'camera', 'hangup', 'fullscreen', 'tileview'],
                SHOW_JITSI_WATERMARK: false
            }
        });

        jitsiApi.addEventListener('videoConferenceJoined', () => {
            videoBtn.innerText = '🎥 Expand Video';
            recordBtn.classList.remove('hidden');
            goFullscreen();
            startRecording();
        });

        jitsiApi.addEventListener('videoConferenceLeft', cleanup);
        jitsiApi.addEventListener('readyToClose', cleanup);
    }

    function cleanup() {
        videoContainer.classList.remove('active');
        videoBtn.innerText = '🎥 Join Video';
        recordBtn.classList.add('hidden');
        stopRecording();
        if (jitsiApi) { jitsiApi.dispose(); jitsiApi = null; }
    }

    function goFullscreen() {
        const req = videoContainer.requestFullscreen || videoContainer.webkitRequestFullscreen;
        if (req) {
            req.call(videoContainer).then(() => {
                if (screen.orientation?.lock) {
                    screen.orientation.lock('portrait').catch(() => {});
                }
            }).catch(() => {});
        }
    }

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && jitsiApi) {
            if (screen.orientation?.unlock) screen.orientation.unlock();
        }
    });

    // ── RECORDING ──
    recordBtn.addEventListener('click', () => {
        if (!isRecording) startRecording(); else stopRecording();
    });

    async function startRecording() {
        if (isRecording) return;
        try {
            recordingStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
            recordedChunks = [];
            const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus') ? 'video/webm;codecs=vp9,opus' : 'video/webm';
            mediaRecorder = new MediaRecorder(recordingStream, { mimeType });
            mediaRecorder.ondataavailable = e => { if (e.data?.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = saveRecording;
            mediaRecorder.start();
            isRecording = true;
            recordBtn.innerText = '⏹ Stop';
            recordStatus.innerText = '🔴 Recording your camera — tap Stop to save.';
            recordStatus.classList.add('visible');
        } catch (err) {
            recordStatus.innerText = `⚠️ ${err.name === 'NotAllowedError' ? 'Camera permission denied.' : err.message}`;
            recordStatus.classList.add('visible');
        }
    }

    function stopRecording() {
        if (!isRecording || !mediaRecorder) return;
        isRecording = false;
        recordBtn.innerText = '⏺ Record';
        recordStatus.innerText = '💾 Saving...';
        try { mediaRecorder.stop(); } catch (e) {}
        if (recordingStream) { recordingStream.getTracks().forEach(t => t.stop()); recordingStream = null; }
    }

    function saveRecording() {
        if (!recordedChunks.length) { recordStatus.classList.remove('visible'); return; }
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `mafia-${currentRoom}-${new Date().toISOString().replace(/[:.]/g, '-')}.webm`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
        recordStatus.innerText = '✅ Saved to your downloads.';
        recordedChunks = [];
    }


</script>
</body>
</html>
